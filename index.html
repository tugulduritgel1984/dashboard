<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidated Plan 2026 — Дашбоард</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg: #f8f9fa; --bg2: #ffffff; --bg3: #f1f3f5;
    --text: #1a1a2e; --text2: #6c757d; --text3: #adb5bd;
    --border: #dee2e6; --border2: #ced4da;
    --blue: #228be6; --blue-light: #e7f5ff; --blue-dark: #1971c2;
    --green: #2f9e44; --green-light: #ebfbee;
    --red: #e03131; --red-light: #fff5f5;
    --amber: #e67700; --amber-light: #fff9db;
    --radius: 8px; --radius-lg: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .logo { width: 32px; height: 32px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* GitHub Auto-Load Banner */
  .sync-banner { background: #e7f5ff; border: 1px solid #74c0fc; padding: 12px; border-radius: var(--radius); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow); }
  .stat-num { font-size: 24px; font-weight: 600; color: var(--blue); }
  
  .tabs { display: flex; gap: 5px; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
  .tab { padding: 10px 20px; cursor: pointer; border: none; background: none; color: var(--text2); }
  .tab.active { color: var(--blue); border-bottom: 2px solid var(--blue); font-weight: 600; }
  
  .view { display: none; }
  .view.active { display: block; }
  
  .table-wrap { overflow-x: auto; background: white; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--bg3); padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; }
  td { padding: 12px; border-bottom: 1px solid var(--border); }
  
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .b-done { background: var(--green-light); color: var(--green); }
  .b-prog { background: var(--blue-light); color: var(--blue); }

  #loadingEl { text-align: center; padding: 50px; }
  .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--blue); animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="logo">CP</div>
    <div>
      <div style="font-weight:600">Consolidated Plan 2026</div>
      <div style="font-size:12px; color:var(--text2)">GitHub Live Dashboard</div>
    </div>
  </div>
  <span id="lastUpdated" style="font-size:11px; color:var(--text3)">Уншиж байна...</span>
</div>

<div class="container">
  <div class="sync-banner">
    <div style="font-size: 13px;"><strong>GitHub Sync:</strong> Өгөгдлийг <code>database.xlsx</code>-ээс автоматаар уншиж байна.</div>
    <input type="file" id="fileInput" hidden onchange="handleManualFile(this.files[0])">
    <button onclick="document.getElementById('fileInput').click()" style="font-size:11px; padding:4px 8px; cursor:pointer;">Файл гараар сонгох</button>
  </div>

  <div id="loadingEl"><div class="spinner"></div><p>Мэдээллийг боловсруулж байна...</p></div>

  <div id="dashContent" style="display:none">
    <div class="stats" id="statsEl"></div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('list', this)">📋 Ажлын жагсаалт</div>
      <div class="tab" onclick="switchTab('charts', this)">📊 График</div>
    </div>

    <div id="list" class="view active">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Ажлын нэр</th><th>Хэлтэс</th><th>Биелэлт</th><th>Төлөв</th></tr>
          </thead>
          <tbody id="listBody"></tbody>
        </table>
      </div>
    </div>

    <div id="charts" class="view">
        <div style="max-width: 600px; margin: auto;"><canvas id="deptChart"></canvas></div>
    </div>
  </div>
</div>

<script>
let ALL_TASKS = [];
const EXCEL_FILE_PATH = 'database.xlsx'; // Make sure your file is named exactly this in GitHub

// 1. Auto-load from GitHub on Startup
window.onload = function() {
    fetch(EXCEL_FILE_PATH)
        .then(res => {
            if (!res.ok) throw new Error("Excel файл олдсонгүй");
            return res.arrayBuffer();
        })
        .then(buffer => parseExcel(buffer))
        .catch(err => {
            console.error(err);
            document.getElementById('loadingEl').innerHTML = "⚠️ GitHub дээр 'database.xlsx' файл олдсонгүй. Гараар оруулна уу.";
        });
};

function handleManualFile(file) {
    const reader = new FileReader();
    reader.onload = e => parseExcel(e.target.result);
    reader.readAsArrayBuffer(file);
}

function parseExcel(data) {
    const workbook = XLSX.read(data, { type: 'array' });
    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(firstSheet);

    // Map your MS Project columns here
    ALL_TASKS = rows.map(row => ({
        name: row['Name'] || row['Task Name'] || 'Нэргүй',
        dept: row['Resource Names'] || row['Department'] || 'Тодорхойгүй',
        pct: parseFloat(row['% Complete']) || 0,
        status: row['Status'] || (parseFloat(row['% Complete']) >= 100 ? 'Дууссан' : 'Явагдаж байна')
    }));

    renderStats();
    renderList();
    renderChart();
    
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('dashContent').style.display = 'block';
    document.getElementById('lastUpdated').textContent = "Шинэчлэгдсэн: " + new Date().toLocaleTimeString();
}

function renderStats() {
    const total = ALL_TASKS.length;
    const done = ALL_TASKS.filter(t => t.pct >= 100).length;
    document.getElementById('statsEl').innerHTML = `
        <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Нийт ажил</div></div>
        <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-lbl">Дууссан</div></div>
        <div class="stat-card"><div class="stat-num">${total - done}</div><div class="stat-lbl">Үлдсэн</div></div>
    `;
}

function renderList() {
    const body = document.getElementById('listBody');
    body.innerHTML = ALL_TASKS.map(t => `
        <tr>
            <td>${t.name}</td>
            <td style="color:var(--text2)">${t.dept}</td>
            <td>${t.pct}%</td>
            <td><span class="badge ${t.pct >= 100 ? 'b-done' : 'b-prog'}">${t.status}</span></td>
        </tr>
    `).join('');
}

function renderChart() {
    const ctx = document.getElementById('deptChart').getContext('2d');
    const depts = [...new Set(ALL_TASKS.map(t => t.dept))];
    const data = depts.map(d => ALL_TASKS.filter(t => t.dept === d).length);

    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: depts,
            datasets: [{ data: data, backgroundColor: ['#228be6', '#40c057', '#fab005', '#fa5252', '#7950f2'] }]
        }
    });
}

function switchTab(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}
</script>
</body>
</html>
